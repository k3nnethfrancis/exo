packages:
  - apps/*
  - benchmarks/*
  - packages/*

overrides:
  fast-uri: 3.1.2

allowBuilds:
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  node-llama-cpp: true
  node-pty: true
  tree-sitter-go: true
  tree-sitter-javascript: true
  tree-sitter-python: true
  tree-sitter-rust: true
  tree-sitter-typescript: true

preferSymlinkedExecutables: true

patchedDependencies:
  '@tobilu/qmd@2.5.3': patches/@tobilu__qmd@2.5.3.patch
